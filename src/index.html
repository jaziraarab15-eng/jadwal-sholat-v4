<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Jadwal Sholat</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="homePage">

<header>
<h2>🕌 Jadwal Sholat</h2>
<p id="kota">Mendeteksi lokasi...</p>
</header>

<div class="card">

<h3>Sholat Berikutnya</h3>

<h1 id="nextPrayer">--:--</h1>

<p id="countdown">00:00:00</p>

</div>

</div>

<div id="sholatPage" style="display:none">

<div class="card">
<h2>🕌 Jadwal Sholat</h2>

<div class="row">
<span>Subuh</span>
<span id="fajr">--:--</span>
</div>

<div class="row">
<span>Syuruq</span>
<span id="sunrise">--:--</span>
</div>

<div class="row">
<span>Zuhur</span>
<span id="dhuhr">--:--</span>
</div>

<div class="row">
<span>Ashar</span>
<span id="asr">--:--</span>
</div>

<div class="row">
<span>Magrib</span>
<span id="maghrib">--:--</span>
</div>

<div class="row">
<span>Isya</span>
<span id="isha">--:--</span>
</div>

</div>

</div>

<div id="kiblatPage" style="display:none">
  <div class="card">
    <h2>🧭 Arah Kiblat</h2>
    <p>Fitur segera hadir...</p>
  </div>
</div>

<div id="bulanPage" style="display:none">
  <div class="card">
    <h2>📅 Jadwal Bulanan</h2>
    <p>Fitur segera hadir...</p>
  </div>
</div>

<div id="menuPage" style="display:none">
  <div class="card">
    <h2>⚙️ Menu</h2>
    <p>Pengaturan aplikasi.</p>
  </div>
</div>

<nav class="bottom-nav">
  <button id="homeBtn">🏠<br>Home</button>
  <button id="sholatBtn">🕌<br>Sholat</button>
  <button id="kiblatBtn">🧭<br>Kiblat</button>
  <button id="bulanBtn">📅<br>Bulanan</button>
  <button id="menuBtn">☰<br>Menu</button>
</nav>

<script type="module" src="js/app.js"></script>

</body>
</html>
